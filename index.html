<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lumis Follow</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- FUNDO MÁGICO -->
<div class="background">
    <div class="fog"></div>
    <div class="stars"></div>
    <div class="particles"></div>
</div>

<!-- APP PRINCIPAL -->
<main class="app">

    <!-- HEADER -->
    <header class="header">

        <div class="logo">
            ✨
        </div>

        <h1>Lumis <span>Follow</span></h1>

        <p>Descubra os segredos escondidos no seu Instagram</p>

    </header>

    <!-- CARD PRINCIPAL -->
    <section class="card">

        <h2>✨ Revelar Perfil</h2>

        <label>@ Usuário</label>
        <input type="text" id="username" placeholder="@seuusuario">

        <label>Arquivo ZIP do Instagram</label>
        <input type="file" id="zipFile" accept=".zip">

        <div class="warning">
            <strong>⚠️ Atenção</strong>
            <p>Faço a magia acontecer, mas a responsabilidade é sua.</p>
        </div>

        <button id="revealBtn">✨ REVELAR MAGIA</button>

    </section>

    <!-- RESULTADOS -->
    <section class="result hidden" id="result">

        <div class="scroll">

            <h2>✨ Lumis Follow</h2>

            <div class="stats">

                <div>
                    <h3 id="followers">0</h3>
                    <p>Seguidores</p>
                </div>

                <div>
                    <h3 id="following">0</h3>
                    <p>Seguindo</p>
                </div>

                <div>
                    <h3 id="notFollowing">0</h3>
                    <p>Não seguem você</p>
                </div>

            </div>

            <div class="search">
                <input type="text" id="search" placeholder="Pesquisar usuário...">
            </div>

            <div class="list" id="userList">
                <!-- usuários aparecem aqui -->
            </div>

            <div class="actions">
                <button id="copy">Copiar</button>
                <button id="download">Baixar TXT</button>
            </div>

        </div>

    </section>

</main>

<!-- OVERLAY MAGIA -->
<div class="overlay hidden" id="overlay">

    <div class="wand">🪄</div>

    <h2 id="magicText">LUMIS</h2>

    <div class="loading"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="script.js"></script>

</body>
</html>
