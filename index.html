<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lumis Follow</title>

<meta name="theme-color" content="#12051f">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Fundo -->
<div class="background">

<div class="stars"></div>

<div class="fog"></div>

<div class="particles"></div>

</div>

<!-- Cristal -->

<div class="crystal"></div>

<!-- Conteúdo -->

<main class="app">

<header>

<div class="logo">

✨

</div>

<h1>

Lumis <span>Follow</span>

</h1>

<p>

A magia revela aquilo que os números escondem.

</p>

</header>



<section class="magic-card">

<h2>

Revelar Perfil

</h2>

<label>

Nome de usuário

</label>

<input

type="text"

id="username"

placeholder="@seuusuario">

<label>

Arquivo oficial do Instagram

</label>

<input

type="file"

id="zipFile"

accept=".zip">

<div class="warning">

<strong>

FAÇO A MAGIA ACONTECER...

</strong>

<p>

Mas toda ação realizada na sua conta é de sua responsabilidade.

</p>

</div>

<button id="revealButton">

✨ REVELAR

</button>

</section>
